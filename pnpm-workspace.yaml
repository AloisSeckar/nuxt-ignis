packages:
  - core
  - demos/*
  - docs
  - modules/*

shamefullyHoist: true

nodeLinker: hoisted

peerDependencyRules:
  ignoreMissing:
    - tailwindcss
    - embla-carousel
    - '@tiptap/y-tiptap'
    - '@tiptap/extensions'
    - yjs
    - unstorage
    - '@unhead/bundler'
  allowedVersions:
    focus-trap: '8'

catalog:
  '@formkit/nuxt': 2.0.0
  '@maas/vue-equipment': 1.0.0-beta.57
  '@nuxt-ignis/content': 0.0.59
  '@nuxt-ignis/db': 0.0.17
  '@nuxt-ignis/default': 0.0.17
  '@nuxt-ignis/forms': 0.0.21
  '@nuxt-ignis/ui': 0.0.15
  '@nuxt-ignis/utils': 0.0.12
  '@nuxt-ignis/validation': 0.0.14
  '@nuxt/content': 3.13.0
  '@nuxt/devtools': ^4.0.0-alpha.4
  '@nuxt/eslint': 1.15.2
  '@nuxt/eslint-config': 1.15.2
  '@nuxt/fonts': 0.14.0
  '@nuxt/image': 2.0.0
  '@nuxt/kit': 4.4.4
  '@nuxt/module-builder': ^1.0.2
  '@nuxt/schema': 4.4.4
  '@nuxt/scripts': 1.0.1
  '@nuxt/test-utils': ^4.0.2
  '@nuxt/ui': 4.6.1
  '@nuxtjs/i18n': 10.2.4
  '@nuxtjs/tailwindcss': 6.14.0
  '@nuxtjs/seo': 5.1.3
  '@nuxtjs/supabase': 2.0.5
  '@pinia/nuxt': 0.11.3
  '@stefanobartoletti/nuxt-social-share': 3.0.0
  '@tailwindcss/vite': 4.2.2
  '@types/node': ^25.6.0
  '@vueform/nuxt': 1.29.0
  '@vueform/vueform': 1.13.11
  '@vueuse/core': 14.2.1
  '@vueuse/nuxt': 14.2.1
  'changelogen': ^0.6.2
  'consola': 3.4.2
  'cross-env': ^10.1.0
  'date-fns': 4.1.0
  'defu': 6.1.7
  'elrh-cosca': 0.3.5
  'elrh-pslo': 1.1.6
  'eslint': ^9.39.4
  'magic-regexp': 0.11.0
  'nuxt': 4.4.4
  'nuxt-auth-utils': 0.5.29
  'nuxt-charts': 2.1.4
  'nuxt-neon': 0.8.3
  'nuxt-security': 2.5.1
  'nuxt-spec': 0.2.2
  'open-props': 1.7.23
  'oxc-minify': ^0.125.0
  'pinia': 3.0.4
  'postcss-jit-props': 1.0.16
  'tailwindcss': 4.2.2
  'typescript': 5.9.3
  'valibot': 1.3.1
  'vitepress': ^2.0.0-alpha.17
  'vitepress-plugin-group-icons': ^1.7.5
  'vitest': ^4.1.4
  'vue': 3.5.33
  'vue-router': 5.0.6
  'vue-tsc': ^3.2.6
  'zod': 4.3.6

minimumReleaseAge: 4320

minimumReleaseAgeExclude: 
  # exclusions for internal modules
  - '@nuxt-ignis/content'
  - '@nuxt-ignis/default'
  - '@nuxt-ignis/db'
  - '@nuxt-ignis/forms'
  - '@nuxt-ignis/ui'
  - '@nuxt-ignis/utils'
  - '@nuxt-ignis/validation'
  # exclusions for modules authored by AloisSeckar
  - 'nuxt-spec'
  - 'nuxt-neon'
  # exclusions for trusted Vue/Nuxt packages
  - 'nuxt'
  - 'nitropack'
  - '@nuxt/kit'
  - '@nuxt/nitro-server'
  - '@nuxt/schema'
  - '@nuxt/vite-builder'
  # manually checked one-time exceptions
  - ufo

allowBuilds:
  '@parcel/watcher': true
  '@tailwindcss/oxide': true
  esbuild: true
  maplibre-gl: true
  puppeteer: true
  sharp: true
  unrs-resolver: true
  vue-demi: true

overrides:
  '@nuxt/test-utils': ^4.0.2
  chokidar: ^5.0.0
  semver: ^7.7.0
  undici-types: ^7.22.0
  # https://github.com/Rich-Harris/estree-walker/issues/26
  estree-walker: 2.0.2
  # TODO check https://github.com/nuxt/nuxt/issues/34812 for permanent solution
  unimport: 6.0.2

trustPolicy: no-downgrade

verifyDepsBeforeRun: error

# TODO remove this when modules settle down
gitChecks: false
